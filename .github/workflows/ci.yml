name: GUNS Unit Test

on:
  push:
    branches:
      - GUNSQA-*
  pull_request:
  workflow_dispatch:
    inputs:
      guns_ref:
        description: GUNS commit, tag, or branch to test
        required: false
        default: 84272f5a324e0d7890d241d7ae9afa7398da49fa
      test_class:
        description: Optional fully qualified JUnit test class for unmanaged manual runs
        required: false
        default: ""
      jira_issue_key:
        description: Optional Jira Test issue key for unmanaged manual runs
        required: false
        default: ""
      xray_test_execution_key:
        description: Optional existing Xray Test Execution key for unmanaged manual runs
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: guns-unit-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guns-unit-test:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref_name, 'GUNSQA-') || startsWith(github.head_ref, 'GUNSQA-')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      GUNS_REPO_URL: https://gitee.com/stylefeng/guns.git
      GUNS_FALLBACK_REPO_URL: https://gitcode.com/javaguns/guns.git
      GUNS_DEFAULT_BRANCH: master
      GUNS_REF: ${{ github.event.inputs.guns_ref || '84272f5a324e0d7890d241d7ae9afa7398da49fa' }}
      GUNS_TEST_CLASS: ""
      XRAY_BASE_URL: https://us.xray.cloud.getxray.app
      XRAY_PROJECT_KEY: GUNSQA
      XRAY_JIRA_ISSUE_KEY: ""
      XRAY_TEST_EXECUTION_KEY: ""
      XRAY_TEST_EXECUTION_MAP_PATH: config/xray-test-executions.json

    steps:
      - name: Checkout guns-qa
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Resolve Jira-driven test context
        id: resolve_test_context
        continue-on-error: true
        shell: bash
        env:
          WORKFLOW_INPUT_GUNS_REF: ${{ github.event.inputs.guns_ref || '' }}
          WORKFLOW_INPUT_TEST_CLASS: ${{ github.event.inputs.test_class || '' }}
          WORKFLOW_INPUT_JIRA_ISSUE_KEY: ${{ github.event.inputs.jira_issue_key || '' }}
          WORKFLOW_INPUT_XRAY_TEST_EXECUTION_KEY: ${{ github.event.inputs.xray_test_execution_key || '' }}
        run: |
          python3 scripts/resolve_guns_test_context.py \
            --mapping-path "$XRAY_TEST_EXECUTION_MAP_PATH" \
            --default-guns-ref "$GUNS_REF" \
            --input-guns-ref "$WORKFLOW_INPUT_GUNS_REF" \
            --input-test-class "$WORKFLOW_INPUT_TEST_CLASS" \
            --input-jira-issue-key "$WORKFLOW_INPUT_JIRA_ISSUE_KEY" \
            --input-xray-test-execution-key "$WORKFLOW_INPUT_XRAY_TEST_EXECUTION_KEY" \
            --github-head-ref "${GITHUB_HEAD_REF:-}" \
            --github-ref-name "${GITHUB_REF_NAME:-}" \
            --github-event-path "${GITHUB_EVENT_PATH:-}" \
            --github-env "$GITHUB_ENV" \
            --github-output "$GITHUB_OUTPUT" \
            --github-step-summary "$GITHUB_STEP_SUMMARY" \
            --context-json-path ".artifacts/guns/context-result.json" \
            --context-summary-path ".artifacts/guns/context-summary.txt"

      - name: Restore Maven dependency cache
        if: steps.resolve_test_context.outcome == 'success'
        uses: actions/cache@v4
        with:
          path: .tmp/m2/repository
          key: ${{ runner.os }}-guns-m2-${{ steps.resolve_test_context.outputs.guns_ref || env.GUNS_REF }}
          restore-keys: |
            ${{ runner.os }}-guns-m2-

      - name: Sync mapped Tests into stable Xray execution
        id: sync_xray_execution
        if: steps.resolve_test_context.outcome == 'success' && steps.resolve_test_context.outputs.managed_issue == 'true'
        continue-on-error: true
        shell: bash
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          JIRA_BASE_URL: https://jira20260410.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: |
          python3 scripts/sync_xray_execution_members.py

      - name: Capture Xray execution sync result
        id: capture_xray_sync_result
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result_path = Path(".artifacts/guns/xray-sync-result.json")
          result = {
              "status": "skipped",
              "category": "xray-sync-skipped",
              "message": "xray-sync-result.json was not produced",
          }
          if result_path.exists():
              result = json.loads(result_path.read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"status={result.get('status', 'skipped')}\n")
              handle.write(f"category={result.get('category', 'xray-sync-skipped')}\n")
              handle.write(f"message={str(result.get('message', '')).replace(chr(10), ' ')}\n")
          PY

      - name: Run selected GUNS unit test
        id: run_guns_test
        if: steps.resolve_test_context.outcome == 'success'
        continue-on-error: true
        shell: bash
        run: bash scripts/run_guns_unit_test.sh

      - name: Capture test run classification
        id: capture_run_result
        if: always() && steps.resolve_test_context.outcome == 'success'
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result_path = Path(".artifacts/guns/run-result.json")
          result = {
              "status": "failure",
              "category": "test-infrastructure-failed",
              "failure_summary": "run-result.json was not produced",
          }
          if result_path.exists():
              result = json.loads(result_path.read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"status={result.get('status', 'failure')}\n")
              handle.write(f"category={result.get('category', 'test-infrastructure-failed')}\n")
              handle.write(f"message={str(result.get('failure_summary', '')).replace(chr(10), ' ')}\n")
          PY

      - name: Import managed test result into Xray
        id: import_xray
        if: always() && steps.resolve_test_context.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          bash scripts/import_xray_results.sh

      - name: Capture Xray import classification
        id: capture_xray_result
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result_path = Path(".artifacts/guns/xray-result.json")
          result = {
              "status": "skipped",
              "category": "xray-import-skipped",
              "message": "xray-result.json was not produced",
              "execution_issue_key": "",
              "import_mode": os.environ.get("XRAY_IMPORT_MODE_RESOLVED", "unknown"),
          }
          if result_path.exists():
              result = json.loads(result_path.read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"status={result.get('status', 'skipped')}\n")
              handle.write(f"category={result.get('category', 'xray-import-skipped')}\n")
              handle.write(f"message={str(result.get('message', '')).replace(chr(10), ' ')}\n")
              handle.write(f"execution_issue_key={result.get('execution_issue_key', '')}\n")
              handle.write(f"import_mode={result.get('import_mode', 'unknown')}\n")
          PY

      - name: Write Jira execution comments
        id: jira_write_back
        if: always() && steps.resolve_test_context.outcome == 'success'
        continue-on-error: true
        shell: bash
        env:
          JIRA_BASE_URL: https://jira20260410.atlassian.net
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          GITHUB_HEAD_REF: ${{ github.head_ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python3 scripts/post_jira_execution_comments.py

      - name: Capture Jira write-back result
        id: capture_jira_result
        if: always()
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          result_path = Path(".artifacts/guns/jira-comment-result.json")
          result = {
              "status": "skipped",
              "category": "jira-comment-skipped",
              "message": "jira-comment-result.json was not produced",
          }
          if result_path.exists():
              result = json.loads(result_path.read_text(encoding="utf-8"))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"status={result.get('status', 'skipped')}\n")
              handle.write(f"category={result.get('category', 'jira-comment-skipped')}\n")
              handle.write(f"message={str(result.get('message', '')).replace(chr(10), ' ')}\n")
          PY

      - name: Publish run summary
        if: always()
        shell: bash
        run: |
          for summary_file in \
            .artifacts/guns/context-summary.txt \
            .artifacts/guns/run-summary.txt \
            .artifacts/guns/xray-sync-summary.txt \
            .artifacts/guns/xray-import-summary.txt \
            .artifacts/guns/jira-comment-summary.txt; do
            if [[ -f "$summary_file" ]]; then
              cat "$summary_file" >> "$GITHUB_STEP_SUMMARY"
              printf '\n' >> "$GITHUB_STEP_SUMMARY"
            fi
          done
          if [[ -f .artifacts/guns/run-metadata.txt ]]; then
            printf '### Raw run metadata\n' >> "$GITHUB_STEP_SUMMARY"
            printf '```\n' >> "$GITHUB_STEP_SUMMARY"
            cat .artifacts/guns/run-metadata.txt >> "$GITHUB_STEP_SUMMARY"
            printf '\n```\n' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guns-surefire-reports
          path: .artifacts/guns/surefire-reports
          if-no-files-found: warn

      - name: Upload run metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guns-run-metadata
          path: |
            .artifacts/guns/context-result.json
            .artifacts/guns/context-summary.txt
            .artifacts/guns/run-metadata.txt
            .artifacts/guns/run-result.json
            .artifacts/guns/run-summary.txt
          if-no-files-found: warn

      - name: Upload Xray import artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guns-xray-import
          path: |
            .artifacts/guns/xray-sync-response.json
            .artifacts/guns/xray-sync-result.json
            .artifacts/guns/xray-sync-summary.txt
            .artifacts/guns/xray-import-response.json
            .artifacts/guns/xray-result.json
            .artifacts/guns/xray-import-summary.txt
          if-no-files-found: warn

      - name: Upload Jira write-back artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: guns-jira-write-back
          path: |
            .artifacts/guns/jira-comment-result.json
            .artifacts/guns/jira-comment-summary.txt
          if-no-files-found: warn

      - name: Fail job with classified status
        if: always()
        shell: bash
        run: |
          if [[ "${{ steps.resolve_test_context.outcome }}" != "success" ]]; then
            echo "context resolution failed: ${{ steps.resolve_test_context.outputs.validation_message }}"
            exit 1
          fi

          run_category="${{ steps.capture_run_result.outputs.category }}"
          sync_category="${{ steps.capture_xray_sync_result.outputs.category }}"
          xray_category="${{ steps.capture_xray_result.outputs.category }}"

          if [[ "${{ steps.resolve_test_context.outputs.managed_issue }}" == "true" && "$sync_category" == "xray-sync-failed" ]]; then
            echo "xray execution member sync failed: ${{ steps.capture_xray_sync_result.outputs.message }}"
            exit 1
          fi

          if [[ "${{ steps.resolve_test_context.outputs.managed_issue }}" == "true" && "$sync_category" == "xray-sync-skipped" ]]; then
            echo "xray execution member sync skipped for managed issue: ${{ steps.capture_xray_sync_result.outputs.message }}"
            exit 1
          fi

          if [[ "$run_category" == "test-infrastructure-failed" ]]; then
            echo "test infrastructure failed: ${{ steps.capture_run_result.outputs.message }}"
            exit 1
          fi

          if [[ "$run_category" == "test-assertion-failed" ]]; then
            echo "test assertion failed: ${{ steps.capture_run_result.outputs.message }}"
            exit 1
          fi

          if [[ "$xray_category" == "xray-import-failed" ]]; then
            echo "xray import failed: ${{ steps.capture_xray_result.outputs.message }}"
            exit 1
          fi

          if [[ "${{ steps.resolve_test_context.outputs.managed_issue }}" == "true" && "$xray_category" == "xray-import-skipped" ]]; then
            echo "xray import skipped for managed issue: ${{ steps.capture_xray_result.outputs.message }}"
            exit 1
          fi

          echo "workflow completed with classified status: run=$run_category sync=$sync_category xray=$xray_category jira=${{ steps.capture_jira_result.outputs.category }}"
