name: Validate Test Docs

on:
  push:
    branches:
      - main
    paths:
      - AGENTS.md
      - docs/testing/**
      - guns-tests/docs/**
      - guns-tests/src/test/**
      - scripts/new-test-doc.ps1
      - scripts/new-test-doc.sh
      - scripts/validate_test_docs.py
  pull_request:
    paths:
      - AGENTS.md
      - docs/testing/**
      - guns-tests/docs/**
      - guns-tests/src/test/**
      - scripts/new-test-doc.ps1
      - scripts/new-test-doc.sh
      - scripts/validate_test_docs.py

permissions:
  contents: read

jobs:
  validate-test-docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate README structure and coverage
        run: python scripts/validate_test_docs.py
